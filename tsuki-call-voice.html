<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tsuki · 语音通话</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@1,9..144,300..900&display=swap" rel="stylesheet" />
  <script src="db-schema.js"></script>

  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    :root {
      --voice: #43d9a0;
      --voice-dim: rgba(67, 217, 160, .15);
      --ink: #e8e8f0;
      --ink-2: #a0a0b8;
      --ink-3: #55556a;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: var(--ink);
      font-family: 'Geist', sans-serif;
      overflow: hidden;
    }

    /* ── 背景渐变球 ── */
    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .bg-orb-1 {
      width: 320px; height: 320px;
      background: radial-gradient(circle, rgba(67,217,160,.22) 0%, transparent 70%);
      top: -60px; left: -60px;
      animation: orbFloat1 8s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(124,108,250,.18) 0%, transparent 70%);
      bottom: 80px; right: -40px;
      animation: orbFloat2 10s ease-in-out infinite;
    }
    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(20px, 30px) scale(1.08); }
    }
    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(-15px, -20px) scale(1.05); }
    }

    /* ── 扫描线 ── */
    .scanline {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,.013) 2px,
        rgba(255,255,255,.013) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* ── 主体 ── */
    .page {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 54px 24px 48px;
      position: relative;
      z-index: 2;
    }

    /* ── 顶部：返回 ── */
    .top-row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .back-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--ink-2);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 13px;
      transition: background .15s;
    }
    .back-btn:hover { background: rgba(255,255,255,.12); }

    .call-type-badge {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: .14em;
      color: var(--voice);
      background: var(--voice-dim);
      border: 1px solid rgba(67,217,160,.25);
      padding: 4px 10px;
      border-radius: 20px;
    }

    /* ── 中央：头像 + 信息 ── */
    .center-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex: 1;
      justify-content: center;
    }

    /* 呼吸光晕 */
    .avatar-halo {
      position: relative;
      margin-bottom: 24px;
    }
    .avatar-halo::before,
    .avatar-halo::after {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 1px solid rgba(67,217,160,.18);
      animation: halo 2.8s ease-out infinite;
    }
    .avatar-halo::after {
      inset: -28px;
      border-color: rgba(67,217,160,.08);
      animation-delay: .7s;
    }
    @keyframes halo {
      0%   { transform: scale(.9); opacity: 0; }
      30%  { opacity: 1; }
      100% { transform: scale(1.1); opacity: 0; }
    }

    .avatar-ring {
      position: absolute;
      inset: -6px;
      border-radius: 50%;
      border: 2px solid rgba(67,217,160,.35);
      animation: ringPulse 2s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%, 100% { opacity: .35; transform: scale(1); }
      50%       { opacity: .7;  transform: scale(1.02); }
    }

    .avatar {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: #0f0f1a;
      border: 2px solid rgba(67,217,160,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 36px;
      color: var(--ink-3);
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    .avatar img { width:100%; height:100%; object-fit:cover; }

    .char-name {
      font-family: 'Fraunces', serif;
      font-size: 28px;
      font-weight: 700;
      font-style: italic;
      color: var(--ink);
      margin-bottom: 6px;
      text-align: center;
    }
    .char-sub {
      font-size: 13px;
      color: var(--ink-3);
      margin-bottom: 28px;
      text-align: center;
    }

    /* 波形动画 */
    .waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 28px;
      margin-bottom: 20px;
    }
    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--voice);
      opacity: .7;
      animation: waveBounce 1.2s ease-in-out infinite;
    }
    .wave-bar:nth-child(1)  { height: 8px;  animation-delay: .0s; }
    .wave-bar:nth-child(2)  { height: 16px; animation-delay: .1s; }
    .wave-bar:nth-child(3)  { height: 22px; animation-delay: .2s; }
    .wave-bar:nth-child(4)  { height: 26px; animation-delay: .3s; }
    .wave-bar:nth-child(5)  { height: 20px; animation-delay: .2s; }
    .wave-bar:nth-child(6)  { height: 14px; animation-delay: .1s; }
    .wave-bar:nth-child(7)  { height: 8px;  animation-delay: .0s; }
    @keyframes waveBounce {
      0%, 100% { transform: scaleY(.4); opacity: .4; }
      50%       { transform: scaleY(1);  opacity: .9; }
    }

    /* 状态文字 */
    .call-status {
      font-size: 13px;
      color: var(--ink-2);
      letter-spacing: .06em;
    }

    /* ── 底部：时间戳 ── */
    .bottom-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .timestamp-label {
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      color: var(--ink-3);
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    .timestamp-value {
      font-family: 'Geist Mono', monospace;
      font-size: 13px;
      color: var(--ink-2);
      letter-spacing: .06em;
    }
    .raw-ts {
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--ink-3);
      letter-spacing: .04em;
      opacity: .6;
    }

    /* 占位提示 */
    .placeholder-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Geist Mono', monospace;
      font-size: 9px;
      letter-spacing: .1em;
      color: var(--ink-3);
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 20px;
      padding: 5px 12px;
      margin-bottom: 16px;
    }
    .placeholder-chip::before {
      content: '';
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--voice);
      opacity: .5;
    }
  </style>
</head>
<body>

<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>
<div class="scanline"></div>

<div class="page">
  <!-- 顶部 -->
  <div class="top-row">
    <div class="back-btn" id="backBtn">
      <i class="fa-solid fa-chevron-left"></i>
    </div>
    <div class="call-type-badge">
      <i class="fa-solid fa-phone"></i> &nbsp;VOICE CALL
    </div>
    <div style="width:36px"></div>
  </div>

  <!-- 中央 -->
  <div class="center-block">
    <div class="avatar-halo">
      <div class="avatar-ring"></div>
      <div class="avatar" id="charAvatar">
        <i class="fa-solid fa-user-astronaut"></i>
      </div>
    </div>

    <div class="char-name" id="charName">—</div>
    <div class="char-sub" id="charSub">语音通话</div>

    <div class="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="call-status" id="callStatus">通话已记录</div>
  </div>

  <!-- 底部 -->
  <div class="bottom-block">
    <div class="placeholder-chip">PLACEHOLDER · VOICE PAGE</div>
    <div class="timestamp-label">接听时间</div>
    <div class="timestamp-value" id="tsValue">—</div>
    <div class="raw-ts" id="rawTs">—</div>
  </div>
</div>

<script>
  const p      = new URLSearchParams(location.search);
  const chatId = p.get('chatId') || '';
  const floor  = parseInt(p.get('floor') || '-1');
  const ts     = parseInt(p.get('ts')    || '0');

  /* ── 返回 ── */
  document.getElementById('backBtn').addEventListener('click', () => {
    if (window.self !== window.top) {
      // hub 用了 location.replace 跳过来，history 里没有 hub，直接关 overlay
      window.parent.postMessage({ type: 'CLOSE_CALL_HUB' }, '*');
    } else {
      history.back();
    }
  });

  /* ── 渲染时间戳 ── */
  if (ts) {
    const d = new Date(ts);
    document.getElementById('tsValue').textContent =
      d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' })
      + ' ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('rawTs').textContent = `ts: ${ts}`;
  }

  /* ── 从 DB 读角色信息 ── */
  const IDB_NAME = 'tsukiphonepromax';

  async function openDb() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(IDB_NAME);
      req.onsuccess = e => resolve(e.target.result);
      req.onerror   = e => reject(e.target.error);
    });
  }

  async function loadInfo() {
    if (!chatId || floor < 0) return;
    try {
      const db   = window.__tsukiDb || await openDb();
      const txM  = db.transaction('messages', 'readonly');
      const msg  = await new Promise((res, rej) => {
        const r = txM.objectStore('messages').get([chatId, floor]);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      });
      if (!msg) return;

      // 拿通话对应 chat → 找 charId
      const txC = db.transaction('chats', 'readonly');
      const chat = await new Promise((res, rej) => {
        const r = txC.objectStore('chats').get(chatId);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      });
      if (!chat) return;

      const charId = chat.charIds && chat.charIds[0];
      if (!charId) return;

      const txCh = db.transaction('chars', 'readonly');
      const char = await new Promise((res, rej) => {
        const r = txCh.objectStore('chars').get(charId);
        r.onsuccess = e => res(e.target.result);
        r.onerror   = e => rej(e.target.error);
      });
      if (!char) return;

      // 填充 UI
      const avatarEl = document.getElementById('charAvatar');
      if (char.avatar) {
        avatarEl.innerHTML = `<img src="${char.avatar}" alt="">`;
      }

      const isGroup = chat.type === 'group';
      document.getElementById('charName').textContent = isGroup
        ? (chat.name || '群聊')
        : (char.remark || char.name);

      document.getElementById('charSub').textContent = isGroup
        ? '群语音通话'
        : char.name + ' · 语音通话';

      const dur = msg.content?.duration;
      if (dur) {
        const mm = String(Math.floor(dur / 60)).padStart(2, '0');
        const ss = String(dur % 60).padStart(2, '0');
        document.getElementById('callStatus').textContent = `通话时长 ${mm}:${ss}`;
      }

    } catch (e) {
      console.warn('[voice-page] 加载信息失败:', e);
    }
  }

  loadInfo();
</script>
</body>
</html>
